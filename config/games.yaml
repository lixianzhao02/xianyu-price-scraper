# NS卡带游戏清单配置
# =====================================================
# 可自由添加、修改、删除游戏条目
#
# 字段说明:
#   name:           游戏名称（显示用）
#   search_keyword: 闲鱼搜索关键词（建议简洁，用游戏名+卡带）
#   version:        版本标识（用于区分不同版本，如 卡带/数字版/不同区服）
#
# 注意：闲鱼搜索是宽泛匹配，数字版/MOD等会被程序自动过滤
# =====================================================

